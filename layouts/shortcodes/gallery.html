<div class="not-prose flex flex-wrap -mx-2 my-4">
  {{ range (split (trim .Inner "\n") "\n") }}
    {{ $parts := split . "|" }}
    {{ $path := trim (index $parts 0) " " }}
    {{ $caption := "" }}
    {{ if gt (len $parts) 1 }}{{ $caption = trim (index $parts 1) " " }}{{ end }}
    {{ if $path }}
    <figure class="w-1/3 max-sm:w-full flex-none px-2 mb-4">
      <a href="{{ $path }}" target="_blank" rel="noopener">
        <img src="{{ $path }}" alt="{{ $caption }}" loading="lazy" class="w-full h-48 object-cover rounded-lg hover:opacity-90 transition-opacity cursor-zoom-in">
      </a>
      {{ with $caption }}<figcaption class="text-center text-sm text-gray-500 pt-1">{{ . }}</figcaption>{{ end }}
    </figure>
    {{ end }}
  {{ end }}
</div>
